name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What limitation or pain point does this address?
      placeholder: "When I do X, I can't easily Y because…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like it to work, including any new parameters or output changes
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area affected
      options:
        - Log querying (Get-EventLog / Get-WinEvent)
        - Output format / file content
        - Parameters / configuration
        - Console output / UX
        - Performance
        - Documentation
        - CI / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of and why you prefer the proposed solution
